<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAFE - Modern Coffee Shop</title>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
--bg:#0a0a0a;
--surface:#1a1a1a;
--border:#2a2a2a;
--text:#ffffff;
--text-dim:#999;
--accent:#00ff88;
--accent-dim:#00cc6a;
--warning:#ff3366;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--text);}
header{position:fixed;width:100%;background:#0a0a0a;border-bottom:1px solid var(--border);}
nav{display:flex;justify-content:space-between;padding:20px;}
.logo{color:var(--accent);font-family:'Bebas Neue';font-size:2rem;cursor:pointer;}
.nav-links{display:flex;gap:20px;}
.nav-links a, .cart-btn{color:white;text-decoration:none;background:none;border:none;cursor:pointer}
.cart-count{background:var(--accent);color:black;padding:2px 6px;border-radius:50%;margin-left:5px}
.page{display:none;padding:100px 20px;}
.active{display:block}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.product-card{border:1px solid var(--border);padding:15px;border-radius:10px}
.product-image{text-align:center;font-size:40px;margin-bottom:10px}
.product-price{color:var(--accent)}
button{padding:8px;border:none;background:var(--accent);cursor:pointer}
.cart-item{border-bottom:1px solid var(--border);padding:10px 0}
</style>
</head>

<body>

<header>
<nav>
<div class="logo" onclick="showPage('home')">CAFE</div>
<div class="nav-links">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('products')">Menu</a>
<button class="cart-btn" onclick="showPage('cart')">
Cart <span id="cartCount">0</span>
</button>
</div>
</nav>
</header>

<!-- HOME -->
<div id="home" class="page active">
<h1>CAFE VIBES ☕</h1>
<p>Fresh coffee & delicious bites made for you</p>
<button onclick="showPage('products')">Explore Menu</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="page">
<h2>Our Menu</h2>
<div id="productList" class="products-grid"></div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h2>Your Order</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total"></span></h3>
<button onclick="showPage('checkout')">Checkout</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<h2>Checkout</h2>
<form onsubmit="placeOrder(event)">
<input placeholder="Name" required><br><br>
<input placeholder="Phone" required><br><br>
<input placeholder="Address" required><br><br>
<button type="submit">Place Order</button>
</form>
</div>

<!-- SUCCESS -->
<div id="success" class="page">
<h1>Order Confirmed ☕</h1>
<p>Your café order has been placed successfully!</p>
<button onclick="reset()">Back to Home</button>
</div>

<script>
const products = [
{id:1,name:"Cappuccino",price:3,image:"☕"},
{id:2,name:"Latte",price:4,image:"🥛"},
{id:3,name:"Cold Coffee",price:5,image:"🧋"},
{id:4,name:"Espresso",price:2,image:"☕"},
{id:5,name:"Sandwich",price:6,image:"🥪"},
{id:6,name:"Burger",price:7,image:"🍔"},
{id:7,name:"Fries",price:3,image:"🍟"},
{id:8,name:"Cake",price:5,image:"🍰"},
{id:9,name:"Ice Cream",price:4,image:"🍨"}
];

let cart=[];

function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
if(p==='cart')renderCart();
}

function renderProducts(){
document.getElementById('productList').innerHTML=
products.map(p=>`
<div class="product-card">
<div class="product-image">${p.image}</div>
<h3>${p.name}</h3>
<p class="product-price">$${p.price}</p>
<button onclick="addToCart(${p.id})">Add</button>
</div>
`).join('');
}

function addToCart(id){
let p=products.find(x=>x.id===id);
cart.push(p);

dataLayer.push({
event:"add_to_cart",
item_name:p.name,
price:p.price
});

updateCart();
}

function renderCart(){
let html="";
let total=0;

cart.forEach(p=>{
total+=p.price;
html+=`<div class="cart-item">${p.name} - $${p.price}</div>`;
});

document.getElementById('cartItems').innerHTML=html;
document.getElementById('total').innerText=total;
}

function updateCart(){
document.getElementById('cartCount').innerText=cart.length;
}

function placeOrder(e){
e.preventDefault();

dataLayer.push({
event:"purchase",
value:cart.reduce((a,b)=>a+b.price,0),
items:cart
});

cart=[];
updateCart();
showPage('success');
}

function reset(){
showPage('home');
}

renderProducts();
</script>

</body>
</html>
